# pytest.ini

[pytest]
testpaths = tests
asyncio_mode = auto
addopts = -v --tb=short --strict-markers

markers =
    unit: Unit tests
    integration: Integration tests (require real API)
    slow: Slow tests
    e2e: End-to-End tests (full cycle)
    requires_auth: Tests requiring authentication
    interactive: Interactive tests with user input
    finalizer: mark test as final cleanup test