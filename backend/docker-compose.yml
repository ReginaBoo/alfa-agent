services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: app_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network  # ← ДОБАВИТЬ: чтобы backend/worker могли подключиться

  timescaledb:
    image: timescale/timescaledb:latest-pg15
    restart: always
    environment:
      POSTGRES_DB: metrics_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5436:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]  # ← убрал лишний redis-cli
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network  # ← ДОБАВИТЬ: чтобы backend/worker могли подключиться

  backend:
    build: .
    depends_on:
      db:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app
    environment:
      - PYTHONPATH=/app
      # Переопределяем переменные для подключения (ВАЖНО!)
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=app_db
      - TIMESCALE_HOST=timescaledb
      - TIMESCALE_PORT=5432
      - TIMESCALE_USER=postgres
      - TIMESCALE_PASSWORD=postgres
      - TIMESCALE_DB=metrics_db
      - REDIS_URL=redis://redis:6379/0
      - RQ_REDIS_URL=redis://redis:6379/0 
    dns:
      - 8.8.8.8
      - 8.8.4.4
    command: >
      sh -c "alembic upgrade head &&
             python scripts/init_timescale.py &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
    networks:
      - app-network  # ← ИЗМЕНИТЬ: было "default", теперь "app-network"

  worker:
    build: .
    command: rq worker sync_jira sync_confluence calculate_metrics
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/app_db
      - TIMESCALE_URL=postgresql://postgres:postgres@timescaledb:5432/metrics_db
      - REDIS_URL=redis://redis:6379/0
      - RQ_REDIS_URL=redis://redis:6379/0
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=app_db
      - TIMESCALE_HOST=timescaledb
      - TIMESCALE_PORT=5432
      - TIMESCALE_USER=postgres
      - TIMESCALE_PASSWORD=postgres
      - TIMESCALE_DB=metrics_db
    volumes:
      - .:/app
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 8.8.4.4
    networks:
      - app-network

volumes:
  postgres_data:
  timescale_data:
  redis_data:

networks:
  app-network:
    driver: bridge